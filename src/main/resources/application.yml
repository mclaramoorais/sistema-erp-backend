spring:
  application:
    name: sistema-erp-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/sistema_erp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true


server:
  port: 8080


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html


logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
